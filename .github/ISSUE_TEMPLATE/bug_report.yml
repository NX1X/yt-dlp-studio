name: Bug Report
description: Report a bug or unexpected behavior in YT-DLP Studio
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

        Before submitting:
          - Search [existing issues](https://github.com/NX1X/yt-dlp-studio/issues?q=is%3Aissue) to avoid duplicates.
          - Make sure you're on the latest release.
          - For **security vulnerabilities**, do **not** file a public issue — see [SECURITY.md](https://github.com/NX1X/yt-dlp-studio/blob/main/SECURITY.md).

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I have searched existing issues and confirmed this is not a duplicate
          required: true
        - label: I am running the latest published version of YT-DLP Studio
          required: true
        - label: This is not a security vulnerability (those go via SECURITY.md)
          required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal, exact steps to reproduce the behavior.
      placeholder: |
        1. Open YT-DLP Studio
        2. Paste URL `https://...`
        3. Select quality "1080p"
        4. Click "Download Now"
        5. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include the exact error message if any.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: YT-DLP Studio Version
      description: From the About tab, or the release archive name (e.g. `0.9.2`)
      placeholder: "0.9.2"
    validations:
      required: true

  - type: dropdown
    id: install-source
    attributes:
      label: Install Source
      options:
        - Standalone EXE (Windows release zip)
        - Run from source (Python)
        - Built from source (PyInstaller)
        - Other (describe in Additional Context)
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows 11
        - Windows 10
        - Linux (Ubuntu / Debian)
        - Linux (Fedora / RHEL)
        - Linux (Arch / other)
        - macOS (unsupported — note in Additional Context)
        - Other
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: "`python --version` (only required if running from source)"
      placeholder: "3.11.9"

  - type: input
    id: site
    attributes:
      label: Source Site (if applicable)
      description: e.g. YouTube, Vimeo, Twitter — leave blank if not URL-related.
      placeholder: "YouTube"

  - type: textarea
    id: logs
    attributes:
      label: Log Output
      description: |
        Paste the relevant log lines from `%APPDATA%\yt-dlp-studio\yt-dlp-studio.log`
        (Windows) or `~/.config/yt-dlp-studio/yt-dlp-studio.log` (Linux).
        Redact any personal data.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, video clips, related issues, environment notes.
