# Sponsorship buttons for the YT-DLP Studio repository.
# Docs: https://docs.github.com/en/repositories/managing-your-repositorys-settings-and-features/customizing-your-repository/displaying-a-sponsor-button-in-your-repository
#
# Dropdown order shown to visitors:
#   1. GitHub Sponsors (NX1X)        <- requires an active GitHub Sponsors
#                                       profile on the NX1X account; until that
#                                       is set up this entry will not render.
#   2. Buy Me a Coffee (nx1x)        <- native button, no duplicate custom link
#   3. NXTools project hub           <- custom link

github: [NX1X]

buy_me_a_coffee: nx1x

custom:
  - "https://nx1xlab.dev/nxtools"

# Other platforms (uncomment if/when used):
# ko_fi: your_kofi_username
# patreon: your_patreon_username
# liberapay: your_liberapay_username
# open_collective: your_oc_slug
