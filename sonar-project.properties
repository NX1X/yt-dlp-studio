# SonarCloud project configuration for yt-dlp-studio.
# Docs: https://docs.sonarsource.com/sonarcloud/advanced-setup/analysis-scope/
#
# Without these exclusions, SonarCloud scanned the entire vendored yt-dlp
# tree and reported ~260 issues we cannot act on (e.g. python:S1192 string
# duplication across 1000+ extractor modules, by-design code-smell findings
# in upstream yt-dlp's networking/postprocessor packages). Those numbers
# drown out the handful of issues in code we actually own.

sonar.projectKey=NX1X_yt-dlp-studio
sonar.organization=nx1x-lab

# Exclude vendored upstream code, internal maintainer docs, the local venv,
# build artifacts, and anything PyInstaller drops in dist/. The Python tests
# are intentionally KEPT in scope: catching real test smells is useful, and
# the handful of false positives there are suppressed inline.
sonar.exclusions=\
    vendor/**,\
    docs-internal/**,\
    venv/**,\
    .venv/**,\
    build/**,\
    dist/**,\
    **/__pycache__/**,\
    **/*.pyc

# Test files live here. Sonar applies a different (less strict) ruleset to
# test code automatically when `sonar.tests` is set.
sonar.sources=src,launcher.py,scripts
sonar.tests=tests

# Coverage report path is set by the CI workflow (sonarcloud-github-action
# step). No coverage config here.

sonar.python.version=3.11
